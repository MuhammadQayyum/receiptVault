<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ReceiptVault - Tenant History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Receipt<span>Vault</span></div>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link">Dashboard</a>
        <a href="/receipts/new" class="navbar-link">Add Receipt</a>
        <a href="/businesses" class="navbar-link">My Businesses</a>
        <a href="/properties" class="navbar-link">Rental Properties</a>
        <a href="/tenants" class="navbar-link">Tenants</a>
        <a href="/invoices" class="navbar-link">Invoices</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users" class="navbar-link">Manage Users</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.45);">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">

    <div class="page-header">
        <div>
            <div class="page-title"
                 th:text="'Tenant History — ' + ${property.propertyName}"></div>
            <div class="page-subtitle"
                 th:text="${property.address + ', ' + property.city + ', ' + property.state}"></div>
        </div>
        <a href="/properties" class="btn btn-secondary">← Back</a>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Tenant</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Move-in Date</th>
                <th>Move-out Date</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${tenants}">
                <td style="font-weight:600;" th:text="${h.tenant.fullName}"></td>
                <td th:text="${h.tenant.email != null ? h.tenant.email : '—'}"></td>
                <td th:text="${h.tenant.phone != null ? h.tenant.phone : '—'}"></td>
                <td th:text="${h.moveInDate != null ? h.moveInDate : '—'}"></td>
                <td th:text="${h.moveOutDate != null ? h.moveOutDate : '—'}"></td>
                <td>
                        <span th:if="${h.current}"
                              style="background:#D1FAE5; color:#065F46; padding:3px 10px;
                                     border-radius:20px; font-size:11px; font-weight:600;">
                            ✓ Current
                        </span>
                    <span th:unless="${h.current}"
                          style="background:#F3F4F6; color:#6B7280; padding:3px 10px;
                                     border-radius:20px; font-size:11px; font-weight:600;">
                            Past
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tenants)}">
                <td colspan="6">
                    <div class="empty-state">
                        <div class="empty-icon">👤</div>
                        <div class="empty-title">No tenant history</div>
                        <div class="empty-desc">No tenants have been assigned to this property.</div>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<footer class="footer">
    ReceiptVault &copy; 2026 &nbsp;·&nbsp; Personal Receipt Management
</footer>

</body>
</html>
