<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ReceiptVault - Edit Receipt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Receipt<span>Vault</span></div>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link">Dashboard</a>
        <a href="/receipts/new" class="navbar-link">Add Receipt</a>
        <a href="/businesses" class="navbar-link">My Businesses</a>
        <a href="/properties" class="navbar-link">Rental Properties</a>
        <a href="/tenants" class="navbar-link">Tenants</a>
        <a href="/invoices" class="navbar-link">Invoices</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users" class="navbar-link">Manage Users</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.45);">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">

    <div th:if="${error}" class="alert alert-danger">
        ⚠ <span th:text="${error}"></span>
    </div>

    <div th:if="${success}" class="alert alert-success">
        ✓ <span th:text="${success}"></span>
    </div>

    <div class="page-header">
        <div>
            <div class="page-title"
                 th:text="'Edit Receipt #' + ${receipt.receiptID}"></div>
            <div class="page-subtitle">Update the details of this receipt</div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <a href="/dashboard" class="btn btn-secondary btn-sm">← Back</a>
            <form th:action="'/receipts/' + ${receipt.receiptID} + '/delete'"
                  method="post"
                  onsubmit="return confirm('Are you sure you want to delete this receipt?')">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger btn-sm">🗑 Delete</button>
            </form>
        </div>
    </div>

    <div class="form-card">
        <form th:action="'/receipts/' + ${receipt.receiptID} + '/edit'" method="post" id="receiptForm">

            <!-- Business Dropdown -->
            <div class="form-group">
                <label class="form-label">Business *</label>
                <select name="businessId" class="form-control" required>
                    <option value="">Select your business...</option>
                    <option th:each="biz : ${businesses}"
                            th:value="${biz.businessID}"
                            th:selected="${receipt.business != null and receipt.business.businessID == biz.businessID}"
                            th:text="${biz.businessName}"></option>
                </select>
            </div>

            <!-- Property Dropdown -->
            <div class="form-group">
                <label class="form-label">Rental Property *</label>
                <select name="propertyId" class="form-control" required
                        id="propertySelect" onchange="populateRent(this)">
                    <option value="" data-rent="">Select a rental property...</option>
                    <option th:each="prop : ${properties}"
                            th:value="${prop.propertyID}"
                            th:selected="${receipt.property != null and receipt.property.propertyID == prop.propertyID}"
                            th:attr="data-rent=${prop.rentPrice}"
                            th:disabled="${!tenantMap[prop.propertyID]}"
                            th:text="${prop.propertyName + ' — ' + prop.address + (tenantMap[prop.propertyID] ? '' : ' ⚠ No Tenant')}">
                    </option>
                </select>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label class="form-label">Amount ($) *</label>
                <input type="number" name="amount" step="0.01" min="0"
                       class="form-control"
                       id="amountField"
                       th:value="${receipt.amount}" required>
                <div id="rentHint"
                     style="display:none; font-size:12px; color:var(--muted); margin-top:5px;">
                    💡 Auto-filled from property monthly rent. You can edit if needed.
                </div>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label class="form-label">Receipt Date *</label>
                <input type="date" name="receiptDate" class="form-control"
                       th:value="${receipt.receiptDate}" required>
            </div>

            <!-- Payment Method -->
            <div class="form-group">
                <label class="form-label">Payment Method *</label>
                <select name="paymentMethod" class="form-control" required
                        id="paymentMethodSelect" onchange="togglePaymentType(this)">
                    <option value="">Select payment method...</option>
                    <option value="Cash" th:selected="${receipt.paymentMethod == 'Cash'}">💵 Cash</option>
                    <option value="Card" th:selected="${receipt.paymentMethod == 'Card'}">💳 Card</option>
                    <option value="Money Order" th:selected="${receipt.paymentMethod == 'Money Order'}">📋 Money Order</option>
                    <option value="Check" th:selected="${receipt.paymentMethod == 'Check'}">🏦 Check</option>
                </select>
            </div>

            <!-- Payment Type (only for Card) -->
            <div class="form-group" id="paymentTypeGroup"
                 th:style="${receipt.paymentMethod == 'Card'} ? 'display:block' : 'display:none'">
                <label class="form-label">Card Type</label>
                <select name="paymentType" class="form-control" id="paymentTypeSelect">
                    <option value="">Select card type...</option>
                    <option value="Credit Card" th:selected="${receipt.paymentType == 'Credit Card'}">💳 Credit Card</option>
                    <option value="Debit Card" th:selected="${receipt.paymentType == 'Debit Card'}">💳 Debit Card</option>
                    <option value="Other" th:selected="${receipt.paymentType == 'Other'}">Other</option>
                </select>
            </div>

            <!-- Security Deposit -->
            <div th:if="${receipt.securityDeposit != null and receipt.securityDeposit.compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                 class="form-group">
                <label class="form-label">Security Deposit ($)</label>
                <input type="number" name="securityDeposit" step="0.01" min="0"
                       class="form-control"
                       th:value="${receipt.securityDeposit}">
            </div>

            <div th:unless="${receipt.securityDeposit != null and receipt.securityDeposit.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px;">
                        <input type="checkbox" id="securityDepositCheck"
                               onchange="toggleSecurityDeposit(this)"
                               style="width:16px; height:16px;">
                        <span style="font-weight:600; color:var(--navy);">Include Security Deposit</span>
                    </label>
                </div>
                <div class="form-group" id="securityDepositGroup" style="display:none;">
                    <label class="form-label">Security Deposit Amount ($) *</label>
                    <input type="number" name="securityDeposit" id="securityDepositAmount"
                           step="0.01" min="0" class="form-control"
                           placeholder="Enter security deposit amount" value="0">
                </div>
            </div>

            <!-- Notes -->
            <div class="form-group">
                <label class="form-label">Notes (Optional)</label>
                <textarea name="notes" class="form-control"
                          placeholder="Any additional notes about this receipt..."
                          th:text="${receipt.notes}"></textarea>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" name="action" value="save" class="btn btn-primary">
                    💾 Save Changes
                </button>
                <button type="submit" name="action" value="print" class="btn btn-primary"
                        style="background:var(--purple);">
                    🖨 Save & Print
                </button>
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    ReceiptVault &copy; 2026 &nbsp;·&nbsp; Personal Receipt Management
</footer>

<script>
function populateRent(select) {
    const rent = select.options[select.selectedIndex].getAttribute('data-rent');
    const amountField = document.getElementById('amountField');
    const hint = document.getElementById('rentHint');
    if (rent && rent !== '') {
        amountField.value = parseFloat(rent).toFixed(2);
        hint.style.display = 'block';
    } else {
        hint.style.display = 'none';
    }
}

function togglePaymentType(select) {
    const paymentTypeGroup = document.getElementById('paymentTypeGroup');
    const paymentTypeSelect = document.getElementById('paymentTypeSelect');
    if (select.value === 'Card') {
        paymentTypeGroup.style.display = 'block';
        paymentTypeSelect.required = true;
    } else {
        paymentTypeGroup.style.display = 'none';
        paymentTypeSelect.required = false;
        paymentTypeSelect.value = '';
    }
}

function toggleSecurityDeposit(checkbox) {
    const group = document.getElementById('securityDepositGroup');
    const amountInput = document.getElementById('securityDepositAmount');
    group.style.display = checkbox.checked ? 'block' : 'none';
    if (!checkbox.checked) {
        amountInput.value = '0';
    }
}

document.getElementById('receiptForm').addEventListener('submit', function(e) {
    const checkbox = document.getElementById('securityDepositCheck');
    const checkboxDepositInput = document.getElementById('securityDepositAmount');
    const descriptionField = document.querySelector('textarea[name="description"]');
    const amountField = document.getElementById('amountField');

    // Case 1: checkbox flow exists (deposit was not previously set)
    if (checkbox && checkboxDepositInput) {
        if (checkbox.checked && checkboxDepositInput.value && parseFloat(checkboxDepositInput.value) > 0) {
            const deposit = parseFloat(checkboxDepositInput.value);
            const currentAmount = parseFloat(amountField.value) || 0;

            amountField.value = (currentAmount + deposit).toFixed(2);

            const depositNote = 'Security Deposit: $' + deposit.toFixed(2);
            descriptionField.value = descriptionField.value
                ? descriptionField.value + '\n' + depositNote
                : depositNote;
        } else {
            checkboxDepositInput.value = '0';
        }
    }

    // Case 2: direct editable field exists (deposit was already set previously)
    const directDepositInput = document.querySelector('input[name="securityDeposit"]:not(#securityDepositAmount)');
    if (directDepositInput) {
        const newDeposit = parseFloat(directDepositInput.value) || 0;

        // Replace or add the Security Deposit note in description
        let desc = descriptionField.value;
        const depositRegex = /Security Deposit: \$[\d.,]+/;

        if (depositRegex.test(desc)) {
            desc = desc.replace(depositRegex, 'Security Deposit: $' + newDeposit.toFixed(2));
        } else if (newDeposit > 0) {
            desc = desc ? desc + '\nSecurity Deposit: $' + newDeposit.toFixed(2) : 'Security Deposit: $' + newDeposit.toFixed(2);
        }

        descriptionField.value = desc;
    }
});
</script>

</body>
</html>
