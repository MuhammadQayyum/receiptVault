<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ReceiptVault - Business Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Receipt<span>Vault</span></div>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link">Dashboard</a>
        <a href="/receipts/new" class="navbar-link">Add Receipt</a>
        <a href="/businesses" class="navbar-link">My Businesses</a>
        <a href="/properties" class="navbar-link">Rental Properties</a>
        <a href="/invoices" class="navbar-link">Invoices</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users" class="navbar-link">Manage Users</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.45);">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">
    <div class="page-header">
        <div>
            <div class="page-title"
                 th:text="${business.businessID != null} ? 'Edit Business' : 'Add New Business'"></div>
            <div class="page-subtitle">Fill in your business details</div>
        </div>
        <a href="/businesses" class="btn btn-secondary">← Back</a>
    </div>

    <div class="form-card">
        <form th:action="${business.businessID != null} ? '/businesses/' + ${business.businessID} + '/edit' : '/businesses/new'"
              method="post">

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Business Name *</label>
                    <input type="text" name="businessName" class="form-control"
                           placeholder="Business or company name"
                           th:value="${business.businessName}" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Owner Name *</label>
                    <input type="text" name="ownerName" class="form-control"
                           placeholder="Full name of the owner"
                           th:value="${business.ownerName}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Business email address"
                           th:value="${business.email}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="Business phone number"
                           th:value="${business.phone}" required>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Street Address *</label>
                    <input type="text" name="address" class="form-control"
                           placeholder="Street address"
                           th:value="${business.address}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">City *</label>
                    <input type="text" name="city" class="form-control"
                           placeholder="City"
                           th:value="${business.city}" required>
                </div>

                <div class="form-group" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div>
                        <label class="form-label">State *</label>
                        <input type="text" name="state" class="form-control"
                               placeholder="State"
                               th:value="${business.state}" required>
                    </div>
                    <div>
                        <label class="form-label">ZIP Code *</label>
                        <input type="text" name="zipCode" class="form-control"
                               placeholder="ZIP code"
                               th:value="${business.zipCode}" required>
                    </div>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Website (Optional)</label>
                    <input type="text" name="website" class="form-control"
                           placeholder="Website URL (optional)"
                           th:value="${business.website}">
                </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    💾 Save Business
                </button>
                <a href="/businesses" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    ReceiptVault &copy; 2026 &nbsp;·&nbsp; Personal Receipt Management
</footer>

</body>
</html>
