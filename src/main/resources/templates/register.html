<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ReceiptVault - Register User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Receipt<span>Vault</span></div>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link">Dashboard</a>
        <a href="/receipts/new" class="navbar-link">Add Receipt</a>
        <a href="/businesses" class="navbar-link">My Businesses</a>
        <a href="/properties" class="navbar-link">Rental Properties</a>
        <a href="/invoices" class="navbar-link">Invoices</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users" class="navbar-link">Manage Users</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.45);">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">

    <div th:if="${error}" class="alert alert-danger">
        ⚠ <span th:text="${error}"></span>
    </div>

    <div class="page-header">
        <div>
            <div class="page-title">Create New User</div>
            <div class="page-subtitle">Add a new user account to the system</div>
        </div>
        <a href="/users" class="btn btn-secondary">← Back</a>
    </div>

    <div class="form-card" style="max-width:500px;">
        <form method="post" action="/register">

            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input type="text" name="fullName" class="form-control"
                       placeholder="Enter full name" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Choose a password" required>
            </div>

            <div class="form-group">
                <label class="form-label">Role *</label>
                <select name="role" class="form-control" required>
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    💾 Create User
                </button>
                <a href="/users" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    ReceiptVault &copy; 2026 &nbsp;·&nbsp; Personal Receipt Management
</footer>

</body>
</html>
