<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ReceiptVault - Property Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Receipt<span>Vault</span></div>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link">Dashboard</a>
        <a href="/receipts/new" class="navbar-link">Add Receipt</a>
        <a href="/businesses" class="navbar-link">My Businesses</a>
        <a href="/properties" class="navbar-link">Rental Properties</a>
        <a href="/invoices" class="navbar-link">Invoices</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users" class="navbar-link">Manage Users</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.45);">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">
    <div class="page-header">
        <div>
            <div class="page-title"
                 th:text="${property.propertyID != null} ? 'Edit Property' : 'Add New Property'"></div>
            <div class="page-subtitle">Enter the details of your rental property</div>
        </div>
        <a href="/properties" class="btn btn-secondary">← Back</a>
    </div>

    <div class="form-card">
        <form th:action="${property.propertyID != null} ? '/properties/' + ${property.propertyID} + '/edit' : '/properties/new'"
              method="post">

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">Property Name *</label>
                    <input type="text" name="propertyName" class="form-control"
                           placeholder="e.g. Downtown Apartment, Oak Street House"
                           th:value="${property.propertyName}" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Unit Number (Optional)</label>
                    <input type="text" name="unitNumber" class="form-control"
                           placeholder="e.g. Apt 2B, Unit 101"
                           th:value="${property.unitNumber}">
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Street Address *</label>
                    <input type="text" name="address" class="form-control"
                           placeholder="Street address"
                           th:value="${property.address}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">City *</label>
                    <input type="text" name="city" class="form-control"
                           placeholder="City"
                           th:value="${property.city}" required>
                </div>

                <div class="form-group"
                     style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div>
                        <label class="form-label">State *</label>
                        <input type="text" name="state" class="form-control"
                               placeholder="State"
                               th:value="${property.state}" required>
                    </div>
                    <div>
                        <label class="form-label">ZIP Code *</label>
                        <input type="text" name="zipCode" class="form-control"
                               placeholder="ZIP code"
                               th:value="${property.zipCode}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Monthly Rent ($) *</label>
                    <input type="number" name="rentPrice" step="0.01" min="0"
                           class="form-control" placeholder="Monthly rent amount"
                           th:value="${property.rentPrice}" required>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Description (Optional)</label>
                    <textarea name="description" class="form-control"
                              placeholder="Any additional notes about this property..."
                              th:text="${property.description}"></textarea>
                </div>

            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    💾 Save Property
                </button>
                <a href="/properties" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    ReceiptVault &copy; 2026 &nbsp;·&nbsp; Personal Receipt Management
</footer>

</body>
</html>
