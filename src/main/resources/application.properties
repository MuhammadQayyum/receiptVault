spring.application.name=receiptvault

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/receiptvault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:receiptvault_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:receiptvault123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=false

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:yourpassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.receipt.email=${RECEIPT_EMAIL:your@gmail.com}

spring.jpa.properties.hibernate.jdbc.time_zone=America/Chicago